# MQTT Controller Settings
mqtt:
  broker: "mqtt.retallack.org.uk"
  port: 1883
  username: ""  # Optional
  password: ""  # Optional
  topic: "eink/display/update"
  
# Home Assistant MQTT Discovery
homeassistant:
  discovery_prefix: "homeassistant"  # Default HA discovery prefix
  device_name: "EInk Display"       # Name shown in HA device registry

# Device settings
device:
  mac_address: "74:C8:C6:CB:05:72"
  max_retries: 5  # Number of upload retry attempts
  ttl_seconds: 0  # Time to live in seconds (0 = no sleep)

# Battery status publishing
battery:
  enabled: true
  interval: 10800  # Publish every 3 hours (seconds)
  
# File paths
files:
  template: "template.yaml"
  output: "device.yaml"
